data:
  dem_path: data/100ft.test1d.tif
  hydro_sediment_path: data/FlowSedimentData.xlsx
  channel_elevation_threshold_ft: 680.0
  inlet_edge: top
  outlet_edge: bottom

fvm:
  n_gauss_points: 1  # 真实 DEM 网格较大；正式训练先用 1 点高斯积分保证显存稳定

physics:
  include_time_terms: true
  simulation_time: 2937600  # 总模拟时间（秒）；对应 Excel 过程线约 34 天
  sample_dt: 86400  # 训练采样时间间隔（秒）；当前按每天一个训练时刻
  morph_dt: 86400  # 级配显式更新时间间隔（秒）
  output_dt: 86400  # 结果输出时间间隔（秒）

  flow:
    typical_depth: 8
    typical_velocity: 1.0
    g: 9.81
    n_manning: 0.01  # 曼宁糙率

  sediment:
    grain_diameters: [0.00025, 0.0005, 0.001, 0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128]
    beta_default: 1.0
    epsilon_default: 0.1
    residual_scale: 1.0
    adaptation_length: 5
    rho_s: 2650.0
    rho_w: 1000.0
    kinematic_viscosity: 0.000001
    wu_theta_cr: 0.02
    skin_shear_factor: 0.9
    alpha_active_layer: 10.0
    w_capacity: 1
    w_initial_sediment: 5
    initial_concentration: 0  # 接近当前水流输沙能力，避免清水全域冲刷
    w_inlet_sediment: 1.0  # 上游入口浓度约束到当前水流输沙能力
    source_sharpness: 0.000001

  morphodynamics:
    porosity: 0.4
    active_layer_thickness: 0.5
    bed_slope_coefficient: 0.05
    bed_change_scale: 0.1
    exchange_weight: 1.0
    bed_slope_diffusion_weight: 1.0

training:
  flow_epochs: 200
  sediment_epochs: 100
  joint_epochs: 50
  flow_loss_tol: 0.0  # >0 时，水动力 loss 低于该值提前停止
  sediment_loss_tol: 0.0  # >0 时，泥沙 loss 低于该值提前停止
  joint_loss_tol: 0.0  # >0 时，联合 loss 低于该值提前停止
  early_stop_patience: 30  # 连续若干 epoch 改善不足则提前停止
  early_stop_min_delta: 0.000001  # 判断 loss 有效改善的最小幅度
  sediment_cell_batch_size: 1024  # 泥沙分粒径自动微分显存占用大，按河道单元分批训练
  flow_lr: 0.0005
  transport_lr: 0.0005
  w_bed_change: 1.0
  output_dir: outputs
  checkpoint_dir: outputs/checkpoints
