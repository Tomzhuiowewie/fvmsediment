domain:
  bounds:
    x_min: 0.0
    x_max: 1000.0
    y_min: 0.0
    y_max: 1000.0
  bbox:
    xmin: 0.0
    xmax: 1000.0
    ymin: 0.0
    ymax: 1000.0
  resolution: 25.0

fvm:
  n_gauss_points: 2

physics:
  include_time_terms: true
  simulation_time: 600
  n_windows: 200
  window_dt: 3.0
  sample_dt: 1.0
  output_dt: 3.0

  flow:
    typical_depth: 10.0
    typical_velocity: 1.0

  sediment:
    ag: 0.001
    grain_diameters: [0.0002,0.0005]

boundary:
  n_bc: 50
  t_normalized: 0.5
  h: 10.0
  u: 1.0
  v: 0.0

training:
  flow_epochs_per_step: 20
  sediment_epochs_per_step: 20
  extra_train_chunk: 100
  max_extra_flow_epochs: 600
  max_extra_sediment_epochs: 800
  flow_lr: 0.001
  transport_lr: 0.001
  flow_loss_tol: 0.0001
  sediment_loss_tol: 0.0001
  max_bed_change_per_step: 0.02